<!DOCTYPE html>
<html dir="rtl" lang="ckb">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Account</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            min-height: 100vh;
            background-image: url('https://i.ibb.co/wNsLC29x/Snapchat-789315152.jpg'); /* گۆڕدرا بە لینکی نوێ */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            position: relative;
        }
        
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 1;
        }
        
        .container {
            position: relative;
            z-index: 2;
            max-width: 500px;
            margin: 20px auto;
            padding: 15px;
            text-align: center;
            display: flex;
            flex-direction: column;
        }
        
        .profile {
            margin-bottom: 15px;
        }
        
        .profile-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid white;
            object-fit: cover;
            background-image: url('https://i.ibb.co/ns1C7jkD/Snapchat-871887284.jpg'); /* وەک خۆی ماوەتەوە */
            background-size: cover;
            background-position: center;
            margin: 0 auto 10px;
        }
        
        .username {
            color: white;
            font-size: 14px;
            margin: 5px 0 5px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            line-height: 1.4;
            max-width: 85%;
            margin-left: auto;
            margin-right: auto;
            font-weight: normal;
        }
        
        .bio {
            color: white;
            margin-bottom: 10px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
            font-size: 12px;
        }
        
        .social-links {
            margin-top: 10px;
            width: 100%;
        }
        
        .social-link {
            display: block;
            background-color: rgba(255, 255, 255, 0.9);
            color: #333;
            text-decoration: none;
            padding: 12px 15px;
            margin: 10px 0;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            transition: transform 0.3s, background-color 0.3s;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.3);
        }
        
        .social-link:hover {
            transform: scale(1.03);
            background-color: rgba(255, 255, 255, 1);
        }
        
        .snapchat {
            background-color: rgba(255, 252, 0, 0.9);
            color: #000;
        }
        
        .tiktok {
            background: linear-gradient(45deg, #000000, #161616);
            color: #fff;
            border: 1px solid #ff0050;
        }
        
        .instagram {
            background: linear-gradient(45deg, #f09433, #d62976, #962fbf, #4f5bd5);
            color: white;
        }
        
        .telegram {
            background: linear-gradient(45deg, #0088cc, #00a0e0);
            color: white;
        }
        
        .icon {
            margin-left: 8px;
            font-size: 20px;
        }
        
        .footer {
            color: white;
            margin-top: 15px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
            font-size: 12px;
            padding-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="overlay"></div>
    
    <div class="container">
        <!-- وێنەی پڕۆفایل و تێکست -->
        <div class="profile">
            <div class="profile-img"></div>
            <div class="username"> 
               you can only win when your mind is stronger than your emotions..!🧠ı
            </div>
        </div>
        
        <!-- لینکەکان -->
        <div class="social-links">
            <!-- لینکی Snapchat -->
            <a href="https://www.snapchat.com/add/grftar6998?share_id=pUrRdiam83A&locale=en-GB" target="_blank" class="social-link snapchat">
                <span class="icon">👻</span>
                Snapchat
            </a>
            
            <!-- لینکی TikTok -->
            <a href="https://www.tiktok.com/@i4m_a7a6?_r=1&_t=ZS-94bOs5e6j8z" target="_blank" class="social-link tiktok">
                <span class="icon">🎵</span>
                TikTok
            </a>
            
            <!-- 3. لینکی Telegram (سێیەم) -->
            <a href="https://t.me/i4m_a7a6" target="_blank" class="social-link telegram">
                <span class="icon">📱</span>
                Telegram
            </a>
            
            <!-- فوتەر -->
            <div class="footer"></div>
        </div>
    </div>
</body>
</html>
